# Levanto variable de ambiente, archivo .env
spring.config.import=optional:file:.env[.properties]

# Application
spring.application.name=whatsapp-reservation-bot
server.port=8080

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/whatsapp_reservas
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# WhatsApp Business API Configuration
whatsapp.api.url=https://graph.facebook.com/v18.0
whatsapp.api.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID}
whatsapp.api.access-token=${WHATSAPP_ACCESS_TOKEN}
whatsapp.api.verify-token=${WHATSAPP_VERIFY_TOKEN:my-secure-token-123}

# Google Calendar Configuration
google.calendar.credentials-file=credentials.json
google.calendar.tokens-directory=tokens
google.calendar.application-name=WhatsApp Reservation Bot
google.calendar.calendar-ids=04fdc684c5c7da4b721f2c78bc856e4b28237df4504243b26aca933fcc259eae@group.calendar.google.com,5ad59402d7c1576939adc86e0980ede4207a0d3f7fef428ff67f9d5391dd3345@group.calendar.google.com,3eba9bca4aac2824fd705465e1d8beb1c2452f6b0f160495ee66ed9eb14680a9@group.calendar.google.com

# Staff Configuration
# Auto-importar calendarios de properties a BD en primera ejecución
staff.auto-import=true

# Business Hours Configuration
business.hours.start=9
business.hours.end=18
business.hours.reservation-duration-minutes=60

# Timezone
business.timezone=America/Montevideo

# Logging
## TODO: Cambiar a INFO o ERROR en producción
logging.level.com.reservas=INFO
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# =====================================================
# CONFIGURACIÓN DE RECORDATORIOS
# =====================================================
# Habilitar/deshabilitar sistema de recordatorios
reminder.enabled=true

# Nombre del template de WhatsApp (debe estar aprobado por Meta)
reminder.template-name=reserva_recordatorio

# Idioma del template
reminder.template-language=es_UY

# Intervalo en minutos para revisar reservas pendientes (default: 5)
reminder.check-interval-minutes=5

# Configuración de recordatorios múltiples
# Cada recordatorio se define con: minutes-before, enabled, template-name (opcional)
# El template-name es opcional, si no se especifica usa reminder.template-name

# Recordatorio 1: 2 horas antes
reminder.times[0].minutes-before=120
reminder.times[0].enabled=true
reminder.times[0].description=Recordatorio 2 horas antes

# Recordatorio 2: 30 minutos antes (deshabilitado por defecto)
reminder.times[1].minutes-before=30
reminder.times[1].enabled=false
reminder.times[1].description=Recordatorio 30 minutos antes

# Puedes agregar más recordatorios:
# reminder.times[2].minutes-before=60
# reminder.times[2].enabled=true
# reminder.times[2].description=Recordatorio 1 hora antes

# =====================================================
# CONFIGURACIÓN DE PARÁMETROS POR TEMPLATE
# =====================================================
# Define qué campos se envían, en qué orden, y el idioma para cada template.
# Campos disponibles:
#   - customer_name: Nombre del cliente
#   - staff_name: Nombre del profesional
#   - date: Fecha (ej: "viernes 20 de marzo")
#   - time: Hora (ej: "15:00")
#   - time_remaining: Tiempo restante (ej: "24 horas")

# Template: recordatorio_reserva
# Formato: Hola {{1}}, recordatorio de cita con {{2}} el {{3}} a las {{4}}
reminder.templates.recordatorio_reserva.params=customer_name,staff_name,date,time
reminder.templates.recordatorio_reserva.language=es_UY

# Template: reserva_recordatorio
# Formato: Hola {{1}}, te recordamos tu reserva: Fecha {{2}}, Hora {{3}}, Con {{4}}, Falta {{5}}
reminder.templates.reserva_recordatorio.params=customer_name,date,time,staff_name,time_remaining
reminder.templates.reserva_recordatorio.language=es_UY
reminder.templates.reserva_recordatorio.params=customer_name,date,time,staff_name,time_remaining
